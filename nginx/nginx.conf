# ============================================================
# Nginx Configuration - Site360 Reverse Proxy
# ============================================================

# Số worker processes (auto = số CPU cores)
worker_processes auto;

# Giới hạn file descriptors (cần tăng khi nhiều kết nối)
worker_rlimit_nofile 65535;

events {
    # Số kết nối đồng thời tối đa mỗi worker
    worker_connections 4096;
    use epoll;        # Hiệu quả nhất trên Linux
    multi_accept on;
}

http {
    # ============================================================
    # Cài đặt cơ bản
    # ============================================================
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log format tùy chỉnh (thêm response time để debug)
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Tối ưu hiệu năng
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Giới hạn body size cho upload ảnh (phải khớp với MAX_FILE_SIZE_MB)
    client_max_body_size 110M;
    client_body_timeout  120s;

    # Ẩn version Nginx khỏi header (bảo mật)
    server_tokens off;

    # Gzip compression để giảm bandwidth
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml;

    # ============================================================
    # Rate Limiting (bổ sung cho rate limit ở Node.js)
    # ============================================================
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ============================================================
    # Upstream: Backend Node.js
    # ============================================================
    upstream backend_api {
        server backend:3001;
        keepalive 32;  # Keep-alive connections tới Node.js
    }

    upstream frontend_app {
        server frontend:80;
        keepalive 16;
    }

    # ============================================================
    # Server block: HTTP -> Redirect HTTPS
    # ============================================================
    server {
        listen 80;
        listen [::]:80;
        server_name _;  # Thay bằng domain thực: yourdomain.com

        # ACME challenge cho Let's Encrypt cert renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect tất cả HTTP sang HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================================
    # Server block: HTTPS (chính)
    # ============================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name yourdomain.com;  # Thay bằng domain thực

        # ---- SSL/TLS Configuration ----
        # Dùng Let's Encrypt: certbot certonly --webroot -d yourdomain.com
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Chỉ dùng TLS 1.2 và 1.3 (loại bỏ TLS 1.0/1.1 cũ và không an toàn)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # OCSP Stapling (tăng tốc TLS handshake)
        ssl_stapling on;
        ssl_stapling_verify on;

        # SSL session cache
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ---- Security Headers ----
        # HSTS: buộc browser dùng HTTPS trong 1 năm
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        # Chống Clickjacking
        add_header X-Frame-Options "SAMEORIGIN" always;
        # Chống MIME sniffing
        add_header X-Content-Type-Options "nosniff" always;
        # XSS Protection
        add_header X-XSS-Protection "1; mode=block" always;
        # Referrer Policy
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Content Security Policy (điều chỉnh theo nhu cầu)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data: https: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none';" always;

        # ---- API Endpoints (Proxy sang Node.js) ----
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Timeout cho upload ảnh lớn
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
            proxy_connect_timeout 5s;
        }

        # Rate limit riêng cho auth endpoints
        location /api/v1/auth/login {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Static Files: Ảnh upload ----
        # Nginx serve trực tiếp từ volume, không qua Node.js (hiệu quả hơn)
        location /uploads/ {
            alias /var/www/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            # Chỉ cho phép ảnh (không serve file khác)
            location ~* \.(jpg|jpeg|png|webp|gif)$ {
                expires 30d;
            }
            # Chặn truy cập file không phải ảnh
            location ~ [^/]\.(php|sh|py|pl|cgi)$ {
                deny all;
            }
        }

        # ---- Frontend React App ----
        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
                proxy_pass http://frontend_app;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # Deny access to hidden files (.env, .git, etc.)
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
